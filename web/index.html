<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Annex96 EV Emulator</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="page">
    <header class="hero">
      <div class="hero-title">Annex96 EV Emulator</div>
      <div class="hero-sub">Live Control Pilot telemetry and EV state control.</div>
      <div class="hero-actions">
        <div id="status" class="status">Connecting…</div>
        <button id="themeToggle" class="ghost">Toggle Theme</button>
      </div>
    </header>

    <section class="grid">
      <div class="card collapsible" data-section="status">
        <button class="card-toggle" data-toggle="status">
          <span class="card-title">Mode 3 Status (IEC 61851-1)</span>
          <span class="chevron">▾</span>
        </button>
        <div class="card-body">
          <div class="kv">
            <div>CP State Code</div><div id="cp_state">—</div>
            <div>CP State Label</div><div id="cp_state_label">—</div>
            <div>CP Voltage + (V)</div><div id="cp_vp">—</div>
            <div>CP Voltage − (V)</div><div id="cp_vn">—</div>
            <div>PWM Duty (%)</div><div id="cp_pwm">—</div>
            <div>Estimated Current (A)</div><div id="cp_amps">—</div>
            <div>Estimated Power (kW @ <span id="mains_v">230</span>V)</div><div id="cp_kw">—</div>
            <div>CP Set State</div><div id="cp_set">—</div>
          </div>
        </div>
      </div>

      <div class="card collapsible" data-section="controls">
        <button class="card-toggle" data-toggle="controls">
          <span class="card-title">Controls</span>
          <span class="chevron">▾</span>
        </button>
        <div class="card-body">
          <div class="controls">
            <div class="control-group">
              <div class="label">Set CP State</div>
              <div class="button-row">
                <button data-action="setstate" data-value="A">State A</button>
                <button data-action="setstate" data-value="B">State B</button>
                <button data-action="setstate" data-value="C">State C</button>
              </div>
            </div>
            <div class="control-group">
              <div class="label">Charging Session</div>
              <div class="button-row">
                <button data-action="control" data-value="pause">Pause</button>
                <button data-action="control" data-value="resume">Resume</button>
                <button data-action="control" data-value="full">Full</button>
                <button data-action="control" data-value="stop">Stop</button>
              </div>
            </div>
            <div class="control-group">
              <div class="label">Snapshot</div>
              <div class="button-row">
                <button data-action="getstate" data-value="now">Refresh Now</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="card collapsible" data-section="watchdog">
        <button class="card-toggle" data-toggle="watchdog">
          <span class="card-title">Watchdog</span>
          <span class="chevron">▾</span>
        </button>
        <div class="card-body">
          <div class="kv">
            <div>Status</div><div id="wdt_status">—</div>
            <div>Last Update</div><div id="last_ts">—</div>
          </div>
        </div>
      </div>

      <div class="card chart collapsible" data-section="chart_pwm">
        <button class="card-toggle" data-toggle="chart_pwm">
          <span class="card-title">PWM Duty vs Time</span>
          <span class="chevron">▾</span>
        </button>
        <div class="card-body">
          <canvas id="chart_pwm" height="260"></canvas>
        </div>
      </div>

      <div class="card chart collapsible" data-section="chart_amps">
        <button class="card-toggle" data-toggle="chart_amps">
          <span class="card-title">Current (A) vs Time</span>
          <span class="chevron">▾</span>
        </button>
        <div class="card-body">
          <canvas id="chart_amps" height="260"></canvas>
        </div>
      </div>

      <div class="card chart collapsible" data-section="chart_kw">
        <button class="card-toggle" data-toggle="chart_kw">
          <span class="card-title">Power (kW) vs Time</span>
          <span class="chevron">▾</span>
        </button>
        <div class="card-body">
          <canvas id="chart_kw" height="260"></canvas>
        </div>
      </div>

      <div class="card log collapsible" data-section="log">
        <button class="card-toggle" data-toggle="log">
          <span class="card-title">Raw Log Tail</span>
          <span class="chevron">▾</span>
        </button>
        <div class="card-body">
          <pre id="log"></pre>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
